services:
  backend:
    build:
      context: ./backend
    container_name: hobit-emnlp-backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_HOBIT_BACKEND_ENDPOINT: http://localhost:8000
    container_name: hobit-emnlp-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
